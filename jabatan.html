<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pengguna Sistem - Paguyuban Kromoredjo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    /* Custom styles for this page */
    .user-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }
    .user-table th, .user-table td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 0.85rem;
    }
    .user-table th {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #f8fafc;
    }
    .user-table .level-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .level-admin { background: #ffebee; color: #c62828; }
    .level-pengurus { background: var(--primary-light); color: var(--primary-dark); }
    .level-anggota { background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>

<main class="konten-utama" style="margin-left:0;">
  <div class="topbar">
    <div class="topbar-inner">
      <div style="display:flex; align-items:center;">
        <button class="btn-back" onclick="history.back()">❮</button>
      </div>
      <p class="topbar-judul">Pengguna Sistem</p>
      <div style="display:flex; align-items:center; gap:12px;">
        <p class="topbar-user" id="topbar-user" style="text-align:right; margin:0; line-height:1.2; font-size:0.75rem;"></p>
        <button id="btn-keluar" title="Keluar" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; width:34px; height:34px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.1rem; transition:0.2s;">🚪</button>
      </div>
    </div>
  </div>

  <div style="padding: 1.5rem;">
    <div class="panel aktif">
      <div class="panel-header">
        <h2 class="panel-judul">Daftar Pengguna <em>dengan Akses Login</em></h2>
        <button class="btn-tambah" id="btn-tambah-jabatan">+ Atur Jabatan</button>
      </div>
      <p style="font-size: .85rem; color: var(--text-mid); margin-top: -1rem; margin-bottom: 1.5rem;">
        Berikut adalah daftar semua anggota yang telah diberikan izin untuk masuk ke dalam sistem.
      </p>
      <div class="table-wrapper" style="border-radius: 14px; overflow: hidden;">
        <table class="user-table">
          <thead>
            <tr>
              <th>Nama Lengkap</th>
              <th>Username</th>
              <th>Level</th>
              <th>Jabatan</th>
              <th style="text-align: center;">Aksi</th>
            </tr>
          </thead>
          <tbody id="user-list-body">
            <!-- Data will be rendered here by JavaScript -->
            <tr><td colspan="5" class="kosong-info">Memuat data pengguna...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- MODAL TAMBAH/EDIT JABATAN -->
<div class="modal-overlay" id="modal-jabatan">
  <div class="modal-box" style="max-width:450px">
    <div class="modal-header">
      <p class="modal-judul" id="modal-jabatan-judul">Tambah Jabatan</p>
      <button class="modal-tutup" data-close-modal="modal-jabatan">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nama Anggota</label>
        <select id="jabatan-select-anggota" class="search-box" style="width:100%; background: var(--bg); border-color: var(--border); color: var(--text-dark); padding:0.8rem">
          <option value="">-- Pilih Anggota --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Jabatan</label>
        <select id="jabatan-select-posisi" class="search-box" style="width:100%; background: var(--bg); border-color: var(--border); color: var(--text-dark); padding:0.8rem">
          <!-- Options will be generated by JS -->
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-batal" data-close-modal="modal-jabatan">Batal</button>
      <button class="btn-simpan" id="btn-simpan-jabatan">Simpan Jabatan</button>
    </div>
  </div>
</div>

<script type="module">
  import { db } from './js/firebase-config.js';
  import { ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  function keluar() {
    sessionStorage.removeItem('kromoredjo_user');
    window.location.href = 'dashboard.html';
  };

  // Use DOMContentLoaded for faster script execution after the DOM is ready
  document.addEventListener('DOMContentLoaded', () => {
    const savedUser = sessionStorage.getItem('kromoredjo_user');
    if (!savedUser) {
      window.location.href = 'dashboard.html';
      return;
    }
    
    const user = JSON.parse(savedUser);
    window.penggunaLogin = user;
    const levelMap = { admin: '👑 Admin', pengurus: '🛡️ Pengurus', anggota: '🔑 Anggota' };
    const roleText = levelMap[user.level] || user.level;
    document.getElementById('topbar-user').innerHTML = `${roleText}<br>${user.username}`;

    // Sembunyikan tombol "Atur Jabatan" jika bukan admin
    if (user.level !== 'admin') {
      document.getElementById('btn-tambah-jabatan').style.display = 'none';
    }

    // --- EVENT LISTENERS (The robust way) ---
    document.getElementById('btn-tambah-jabatan').addEventListener('click', () => bukaModalJabatan());
    document.getElementById('btn-simpan-jabatan').addEventListener('click', simpanJabatan);
    document.getElementById('btn-keluar').addEventListener('click', keluar);

    // Generic listener for all modal close buttons
    document.querySelectorAll('[data-close-modal]').forEach(btn => {
      btn.addEventListener('click', () => {
        const modalId = btn.getAttribute('data-close-modal');
        tutupModal(modalId);
      });
    });

    // Event delegation for dynamically created "Edit" buttons
    document.getElementById('user-list-body').addEventListener('click', (event) => {
      if (event.target.classList.contains('btn-edit-jabatan')) {
        const userId = event.target.dataset.userId;
        bukaModalJabatan(userId);
      }
    });

    renderUserList();
  });

  function bukaModal(id) { document.getElementById(id)?.classList.add('aktif'); }
  function tutupModal(id) { document.getElementById(id)?.classList.remove('aktif'); }

  // --- START: JABATAN MANAGEMENT ---

  const JABATAN_LIST = [
    { group: "Struktur Inti", roles: ["Penasihat", "Ketua Paguyuban", "Wakil Ketua", "Sekretaris", "Bendahara"] },
    { group: "Seksi / Divisi", roles: ["Seksi Rohani","Seksi Humas", "Seksi Acara", "Seksi Konsumsi", "Seksi Dana & Sosial", "Seksi Dokumentasi"] },
    { group: "Koordinator", roles: ["Koordinator Wilayah", "Perwakilan Generasi"] }
  ];

  function generateJabatanOptions(selectedValue = "") {
    let optionsHtml = `<option value="">-- Hapus Jabatan --</option>`;
    JABATAN_LIST.forEach(cat => {
      optionsHtml += `<optgroup label="${cat.group}">`;
      cat.roles.forEach(role => {
        optionsHtml += `<option value="${role}" ${selectedValue === role ? 'selected' : ''}>${role}</option>`;
      });
      optionsHtml += `</optgroup>`;
    });
    return optionsHtml;
  }

  async function bukaModalJabatan(userId = null) {
      const judul = document.getElementById('modal-jabatan-judul');
      const selectAnggota = document.getElementById('jabatan-select-anggota');
      const selectPosisi = document.getElementById('jabatan-select-posisi');

      // Reset form
      selectAnggota.innerHTML = '<option value="">-- Memuat... --</option>';
      selectPosisi.innerHTML = generateJabatanOptions();
      
      const snapshot = await get(ref(db, "anggota"));
      if (!snapshot.exists()) return;
      const allMembers = Object.values(snapshot.val());
      const kandidat = allMembers.filter(m => m.bolehDaftar === true);

      // Populate member dropdown
      selectAnggota.innerHTML = '<option value="">-- Pilih Anggota --</option>';
      kandidat.forEach(k => {
          selectAnggota.innerHTML += `<option value="${k.id}">${k.nama}</option>`;
      });

      if (userId) {
          judul.textContent = 'Edit Jabatan Anggota';
          const user = allMembers.find(u => String(u.id) === String(userId));
          if (user) {
              selectAnggota.value = user.id;
              selectPosisi.innerHTML = generateJabatanOptions(user.jabatan || "");
              selectAnggota.disabled = true;
          }
      } else {
          judul.textContent = 'Atur Jabatan Baru';
          selectAnggota.disabled = false;
      }

      bukaModal('modal-jabatan');
  };

  async function simpanJabatan() {
      const userId = document.getElementById('jabatan-select-anggota').value;
      const jabatanBaru = document.getElementById('jabatan-select-posisi').value;

      if (!userId) {
          alert("Silakan pilih anggota terlebih dahulu.");
          return;
      }

      const snapshot = await get(ref(db, `anggota/${userId}`));
      if (!snapshot.exists()) return alert("Data anggota tidak ditemukan.");

      const user = snapshot.val();
      user.jabatan = jabatanBaru;
      if (user.level !== 'admin') user.level = jabatanBaru ? 'pengurus' : 'anggota';

      await set(ref(db, `anggota/${userId}`), user);
      alert("Jabatan berhasil disimpan.");
      tutupModal('modal-jabatan');
      renderUserList();
  };

  async function renderUserList() {
    const userListBody = document.getElementById('user-list-body');
    if (!userListBody) return;

    try {
      const snapshot = await get(ref(db, "anggota"));
      if (!snapshot.exists()) {
        userListBody.innerHTML = '<tr><td colspan="5" class="kosong-info">Tidak ada data anggota.</td></tr>';
        return;
      }

      const allMembers = Object.values(snapshot.val());
      const isAdmin = window.penggunaLogin?.level === 'admin';
      const loginUsers = allMembers
        .filter(member => member.bolehDaftar === true || member.level === 'admin')
        .sort((a, b) => {
          // Sort by level: admin > pengurus > anggota
          const levelOrder = { 'admin': 1, 'pengurus': 2, 'anggota': 3 };
          const levelA = levelOrder[a.level] || 4;
          const levelB = levelOrder[b.level] || 4;
          if (levelA !== levelB) {
            return levelA - levelB;
          }
          // If level is the same, sort by name
          return (a.nama || '').localeCompare(b.nama || '');
        });

      if (loginUsers.length === 0) {
        userListBody.innerHTML = '<tr><td colspan="5" class="kosong-info">Belum ada anggota yang diberi akses login.</td></tr>';
        return;
      }

      let html = '';
      loginUsers.forEach(user => {
        const level = user.level || 'anggota';
        const username = user.panggilan ? user.panggilan.toLowerCase() : (user.nama || '').split(' ')[0].toLowerCase();
        
        html += `
          <tr>
            <td><strong>${user.nama || '-'}</strong></td>
            <td><em>@${username}</em></td>
            <td><span class="level-badge level-${level}">${level}</span></td>
            <td style="color: var(--primary); font-weight: 600;">${user.jabatan || '-'}</td>
            <td style="text-align: center;">
              ${isAdmin ? `<button class="btn-sm btn-edit-jabatan" data-user-id="${user.id}" style="font-size: 0.7rem; padding: 4px 10px;">✏ Edit</button>` : '-'}
            </td>
          </tr>
        `;
      });

      userListBody.innerHTML = html;

    } catch (error) {
      console.error("Gagal mengambil data pengguna:", error);
      userListBody.innerHTML = '<tr><td colspan="5" class="kosong-info">Terjadi kesalahan saat memuat data.</td></tr>';
    }
  }
</script>

</body>
</html>
