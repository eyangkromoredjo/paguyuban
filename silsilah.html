<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silsilah Keluarga - Eyang Kromoredjo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }
    
    .konten-utama {
      margin-left: 0;
      flex: 1;
      min-height: 100vh;
      padding: 0;
    }

    /* SILSILAH INTERAKTIF STYLES */
    .silsilah-container {
      width: 100%;
      height: calc(100vh - 120px);
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle at center, rgba(0,84,166,0.1) 0%, transparent 85%);
    }
    #tree-svg { width: 100%; height: 100%; cursor: grab; transition: transform 0.4s ease, width 0.4s ease, height 0.4s ease; transform-origin: center; }
    #tree-svg:active { cursor: grabbing; }

    .link { fill: none; stroke: var(--primary); stroke-width: 1.5px; opacity: 0.3; transition: all 0.3s; }
    .node { cursor: pointer; }
    .node rect { 
      fill: var(--bg-card); 
      stroke: var(--primary); 
      stroke-width: 1px; 
      rx: 4px; ry: 4px; 
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
      transition: all 0.3s;
    }
    .node:hover rect { stroke: var(--primary-mid); stroke-width: 2px; }
    .node text { pointer-events: none; user-select: none; }
    .node .nama { font-family: 'Outfit', sans-serif; font-size: 13px; fill: var(--text-dark); font-weight: bold; }
    .node .panggilan { font-family: 'Inter', sans-serif; font-size: 9px; fill: var(--primary); }
    .node .pasangan { font-size: 10px; fill: var(--text-mid); font-style: italic; }
    .node .arisan-icon { font-size: 14px; }
    
    .collapse-btn { fill: var(--bg-card); stroke: var(--primary); stroke-width: 1px; }
    .collapse-text { font-size: 10px; fill: var(--primary); font-weight: bold; }

    .zoom-controls {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 60;
    }
    .zoom-btn {
      width: 40px; height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--primary);
      color: var(--primary);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
    }
    .zoom-btn:hover { background: var(--primary-light); color: var(--primary-dark); }

    .gen-filter {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      z-index: 60;
    }
    .gen-btn {
      padding: 0.4rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--primary);
      color: var(--primary);
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      font-weight: 600;
    }
    .gen-btn:hover { background: var(--primary-light); }
    .gen-btn.active { background: var(--primary); color: white; }

    /* GARIS LINTAS GENERASI */
    .link-lintas-gen {
      fill: none;
      stroke: #e07b39;
      stroke-width: 2px;
      stroke-dasharray: 7 4;
      opacity: 0.9;
      animation: dashMove 1.8s linear infinite;
    }
    @keyframes dashMove { to { stroke-dashoffset: -22; } }

    .label-lintas-gen {
      font-size: 10px;
      fill: #e07b39;
      font-weight: bold;
      pointer-events: none;
      user-select: none;
    }
    .label-lintas-gen-bg {
      fill: var(--bg-card);
      stroke: #e07b39;
      stroke-width: 0.8px;
      rx: 3px;
    }

    /* Badge lintas gen di dalam node */
    .badge-lintas-bg { fill: rgba(224,123,57,0.12); stroke: #e07b39; stroke-width: 0.8px; }
    .badge-lintas { font-size: 9px; fill: #e07b39; font-weight: bold; pointer-events: none; }

    /* LEGENDA */
    .legenda {
      position: absolute;
      bottom: 1.2rem;
      left: 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-mid);
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 5px;
      box-shadow: var(--shadow-sm);
    }
    .legenda-item { display: flex; align-items: center; gap: 7px; }
    .legenda-garis {
      width: 28px; height: 3px; border-radius: 2px;
      display: inline-block; flex-shrink: 0;
    }

    /* SILSILAH INTERAKTIF STYLES */
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

  <main class="konten-utama">
    <div class="topbar">
      <div class="topbar-inner">
        <div style="display:flex; align-items:center;">
          <button class="btn-back" onclick="history.back()" id="topbar-back-btn">❮</button>
        </div>
        <p class="topbar-judul" id="topbar-judul">Pohon Silsilah</p>
        <div style="display:flex; align-items:center; gap:12px;">
          <p class="topbar-user" id="topbar-user" style="text-align:right; margin:0; line-height:1.2; font-size:0.75rem;"></p>
          <button onclick="window.keluar()" title="Keluar" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; width:34px; height:34px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.1rem; transition:0.2s;">🚪</button>
        </div>
      </div>
    </div>

    <div class="silsilah-container">
      <svg id="tree-svg">
        <defs>
          <marker id="arrow-lintas" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#e07b39"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
      </svg>
      <div class="legenda">
        <div class="legenda-item">
          <span class="legenda-garis" style="background:var(--primary);opacity:0.4;"></span>
          Garis keturunan
        </div>
        <div class="legenda-item">
          <span class="legenda-garis" style="background:#e07b39;"></span>
          💍 Nikah lintas generasi
        </div>
        <div class="legenda-item">🪦 Wafat &nbsp;&nbsp; 💰 Lunas arisan</div>
      </div>
      <div class="gen-filter" id="gen-filter-container">
        <button class="gen-btn active" data-gen="all">Semua</button>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="Zoom In">+</button>
        <button class="zoom-btn" id="zoom-out" title="Zoom Out">−</button>
        <button class="zoom-btn" id="zoom-rotate" title="Rotasi 90°">↻</button>
        <button class="zoom-btn" id="zoom-reset" title="Reset Tampilan">⟲</button>
      </div>
    </div>
  </main>

<script type="module">
  import { db } from './js/firebase-config.js';
  import { ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  window.keluar = function() {
    sessionStorage.removeItem('kromoredjo_user');
    window.location.href = 'dashboard.html';
  };

  // Proteksi Halaman
  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('kromoredjo_user');
    if (!saved) {
      location.href = 'dashboard.html';
    } else {
      const user = JSON.parse(saved);
      window.penggunaLogin = user;
      
      // Setup UI Silsilah
      const levelMap = { admin: '👑 Admin', pengurus: '🛡️ Pengurus', anggota: '🔑 Anggota' };
      const roleText = levelMap[user.level] || user.level;
      document.getElementById('topbar-user').innerHTML = `${roleText}<br>${user.username}`;

      startRealtimeSilsilah();
    }
  });

  let root, treeLayout, svg, gContainer, zoom, currentRotation = 0;
  let currentGenFilter = 'all'; // 'all' or number (max generation to show)
  const nodeW = 180, nodeH = 70;

  // Function to prune tree based on generation filter
  function pruneByGeneration(node, maxGen) {
    if (maxGen === 'all') return node;
    
    const maxGenNum = parseInt(maxGen);
    
    function pruneRecursive(n) {
      if (!n) return null;
      
      // Get the generation number from the data
      const nodeGen = n.generasi ? parseInt(n.generasi) : 0;
      
      // If this node's generation exceeds the max, remove it and its children
      if (nodeGen > maxGenNum) {
        return null;
      }
      
      // Create a copy of the node
      const prunedNode = { ...n };
      
      // Recursively prune children
      if (n.children && n.children.length > 0) {
        prunedNode.children = n.children
          .map(child => pruneRecursive(child))
          .filter(child => child !== null);
      }
      
      return prunedNode;
    }
    
    return pruneRecursive(node);
  }

  function startRealtimeSilsilah() {
    const now = new Date();
    const currentKey = `${now.getFullYear()}_${now.getMonth() + 1}`;
    onValue(ref(db, "anggota"), (snapAnggota) => {
      onValue(ref(db, "arisan/" + currentKey), (snapArisan) => {
        const anggota = snapAnggota.exists() ? Object.values(snapAnggota.val()) : [];
        const arisan = snapArisan.exists() ? snapArisan.val().pembayaran : [];
        initD3(anggota, arisan);
      });
    });
  }

  function initD3(data, arisanData) {
    const lunasIds = arisanData ? arisanData.filter(p => p.lunas).map(p => p.id) : [];

    // Kumpulkan pasangan lintas generasi (nikahLintasGen: true, idPasanganLintasGen: "xxx")
    // Simpan sebagai pasangan unik agar tidak digambar dua kali
    window._lintasGenPairs = [];
    const _lintasKeys = new Set();
    data.forEach(a => {
      if (a.nikahLintasGen && a.idPasanganLintasGen) {
        const pair = [String(a.id), String(a.idPasanganLintasGen)].sort();
        const key = pair.join('|');
        if (!_lintasKeys.has(key)) {
          _lintasKeys.add(key);
          window._lintasGenPairs.push({ key, id1: pair[0], id2: pair[1] });
        }
      }
    });
    const spouseMap = {};
    data.forEach(a => { 
      const sid = a.spouseId || a.idPasangan;
      if(sid) spouseMap[String(sid)] = a; 
    });

    // Generate generation filter buttons (static: Gen 0 to Gen 7)
    const genFilterContainer = document.getElementById('gen-filter-container');
    
    // Only generate buttons once
    if (!genFilterContainer.hasAttribute('data-buttons-generated')) {
      genFilterContainer.innerHTML = '<button class="gen-btn active" data-gen="all">Semua</button>';
      
      for (let i = 0; i <= 7; i++) {
        const btn = document.createElement('button');
        btn.className = 'gen-btn';
        btn.setAttribute('data-gen', i);
        btn.textContent = `Gen ${i}`;
        genFilterContainer.appendChild(btn);
      }
      
      // Add event listeners to generation filter buttons
      genFilterContainer.querySelectorAll('.gen-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          genFilterContainer.querySelectorAll('.gen-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentGenFilter = this.getAttribute('data-gen');
          initD3(data, arisanData); // Re-render with new filter
        });
      });
      
      genFilterContainer.setAttribute('data-buttons-generated', 'true');
    }
    
    // Restore active state
    genFilterContainer.querySelectorAll('.gen-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.getAttribute('data-gen') === currentGenFilter) {
        btn.classList.add('active');
      }
    });

    const nest = (pId) => {
      return data.filter(a => String(a.parentId || a.idOrangTua) === String(pId))
                 .sort((a, b) => (parseInt(a.urutan || a.urutan_anak) || 0) - (parseInt(b.urutan || b.urutan_anak) || 0))
                 .map(child => ({
                   ...child,
                   isLunas: lunasIds.includes(child.id),
                   spouse: spouseMap[String(child.id)],
                   children: nest(child.id)
                 }));
    };

    const roots = data.filter(a => {
        const pId = a.parentId || a.idOrangTua;
        const sId = a.spouseId || a.idPasangan;
        return (!pId || pId === "") && !sId;
    });
    if (!roots.length) return;

    const hierarchyData = roots.length > 1 
      ? { name: "Root", dummy: true, children: roots.map(r => ({ ...r, isLunas: lunasIds.includes(r.id), spouse: spouseMap[r.id], children: nest(r.id) })) }
      : { ...roots[0], isLunas: lunasIds.includes(roots[0].id), spouse: spouseMap[roots[0].id], children: nest(roots[0].id) };

    // Prune tree based on generation filter
    const prunedData = pruneByGeneration(hierarchyData, currentGenFilter);

    svg = d3.select("#tree-svg");
    svg.selectAll("*").remove();
    gContainer = svg.append("g");

    zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => gContainer.attr("transform", e.transform));
    svg.call(zoom);

    d3.select("#zoom-in").on("click", () => svg.transition().call(zoom.scaleBy, 1.3));
    d3.select("#zoom-out").on("click", () => svg.transition().call(zoom.scaleBy, 0.7));
    d3.select("#zoom-reset").on("click", () => svg.transition().call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 50).scale(0.8)));

    d3.select("#zoom-rotate").on("click", () => {
      currentRotation = (currentRotation === 0) ? 90 : 0;
      const container = document.querySelector('.silsilah-container');
      const kontW = container.clientWidth;
      const kontH = container.clientHeight;

      if (currentRotation === 90) {
        // Tukar dimensi agar lebar SVG menggunakan tinggi layar
        svg.style("width", kontH + "px")
           .style("height", kontW + "px")
           .style("position", "absolute")
           .style("top", "50%")
           .style("left", "50%")
           .style("transform", `translate(-50%, -50%) rotate(${currentRotation}deg)`);
      } else {
        // Kembali ke dimensi normal
        svg.style("width", "100%")
           .style("height", "100%")
           .style("position", "relative")
           .style("top", "0")
           .style("left", "0")
           .style("transform", `rotate(${currentRotation}deg)`);
      }
      
      // Reset tampilan agar bagan berada di tengah ruang yang baru
      setTimeout(() => {
        svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 50).scale(0.8));
      }, 450);
    });

    treeLayout = d3.tree().nodeSize([nodeW + 40, nodeH + 100]);
    root = d3.hierarchy(prunedData);
    root.x0 = svg.node().clientWidth / 2;
    root.y0 = 0;

    update(root);
    svg.call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 50).scale(0.8));
  }

  function update(source) {
    const treeData = treeLayout(root);
    const nodes = treeData.descendants().filter(d => !d.data.dummy);
    const links = treeData.links().filter(d => !d.source.data.dummy);

    nodes.forEach(d => { d.y = d.depth * 180; });

    const node = gContainer.selectAll("g.node").data(nodes, d => d.data.id);
    const nodeEnter = node.enter().append("g")
      .attr("class", "node")
      .attr("transform", d => `translate(${source.x0 || source.x},${source.y0 || source.y})`)
      .on("click", (event, d) => {
        if (d.children) { d._children = d.children; d.children = null; }
        else { d.children = d._children; d._children = null; }
        update(d);
      });

    nodeEnter.append("rect").attr("width", nodeW).attr("height", nodeH).attr("x", -nodeW/2).attr("y", -nodeH/2);
    
    nodeEnter.append("text").attr("class", "nama").attr("text-anchor", "middle").attr("y", -10)
      .text(d => (d.data.kehidupan === 'wafat' ? '🪦 ' : '') + d.data.nama);
    
    nodeEnter.append("text").attr("class", "panggilan").attr("text-anchor", "middle").attr("y", 10)
      .text(d => d.data.panggilan ? `"${d.data.panggilan}"` : `Gen ${d.data.generasi}`);

    nodeEnter.each(function(d) {
      if (d.data.spouse) {
        const label = d.data.gender === 'P' ? 'Istri dari' : 'Suami dari';
        d3.select(this).append("text").attr("class", "pasangan").attr("text-anchor", "middle").attr("y", 25)
          .text(`${label} ${d.data.spouse.panggilan || d.data.spouse.nama}`);
      }
      if (d.data.isLunas) {
        d3.select(this).append("text").attr("class", "arisan-icon").attr("x", nodeW/2 - 15).attr("y", -nodeH/2 + 15).text("💰");
      }
      // Badge lintas generasi
      if (d.data.nikahLintasGen) {
        d3.select(this).append("rect").attr("class", "badge-lintas-bg")
          .attr("x", -nodeW/2 + 4).attr("y", -nodeH/2 - 16)
          .attr("width", 78).attr("height", 14).attr("rx", 3);
        d3.select(this).append("text").attr("class", "badge-lintas")
          .attr("x", -nodeW/2 + 8).attr("y", -nodeH/2 - 5)
          .text("⚠ lintas generasi");
      }
      if (d.children || d._children) {
        d3.select(this).append("circle").attr("class", "collapse-btn").attr("r", 7).attr("cy", nodeH/2);
        d3.select(this).append("text").attr("class", "collapse-text").attr("text-anchor", "middle").attr("y", nodeH/2 + 3)
          .text(d => d.children ? "−" : "+");
      }
    });

    const nodeUpdate = nodeEnter.merge(node);
    nodeUpdate.transition().duration(500).attr("transform", d => `translate(${d.x},${d.y})`);
    nodeUpdate.select("text.collapse-text").text(d => d.children ? "−" : "+");

    const nodeExit = node.exit().transition().duration(500)
      .attr("transform", d => `translate(${source.x},${source.y})`).remove();

    const link = gContainer.selectAll("path.link").data(links, d => d.target.id);
    const linkEnter = link.enter().insert("path", "g")
      .attr("class", "link")
      .attr("d", d => {
        const o = { x: source.x0 || source.x, y: source.y0 || source.y };
        return generatorGarisSiku({ source: o, target: o });
      });

    link.merge(linkEnter).transition().duration(500).attr("d", generatorGarisSiku);
    link.exit().transition().duration(500).attr("d", d => {
      const o = { x: source.x, y: source.y };
      return generatorGarisSiku({ source: o, target: o });
    }).remove();

    nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });

    // Panggil render garis lintas gen setelah posisi node diketahui
    renderLintasGen(nodes);
  }

  // ── RENDER GARIS LINTAS GENERASI ──
  // Fungsi terpisah agar garis di-insert SEBELUM node (di belakang kotak)
  function renderLintasGen(nodes) {
    gContainer.selectAll("path.link-lintas-gen").remove();

    const posMap = {};
    nodes.forEach(d => { posMap[String(d.data.id)] = { x: d.x, y: d.y }; });

    (window._lintasGenPairs || []).forEach(pair => {
      const pos1 = posMap[pair.id1];
      const pos2 = posMap[pair.id2];
      if (!pos1 || !pos2) return;

      const [from, to] = pos1.y <= pos2.y ? [pos1, pos2] : [pos2, pos1];
      const curveX = Math.max(from.x, to.x) + nodeW + 60;

      const pathD = [
        `M ${from.x + nodeW/2},${from.y}`,
        `C ${curveX},${from.y}`,
        `  ${curveX},${to.y}`,
        `  ${to.x + nodeW/2},${to.y}`
      ].join(' ');

      // insert sebelum node pertama = tampil di belakang semua kotak
      gContainer.insert("path", "g.node")
        .attr("class", "link-lintas-gen")
        .attr("d", pathD)
        .attr("marker-end", "url(#arrow-lintas)");
    });
  }

  function generatorGarisSiku({ source, target }) {
    const s = { x: source.x, y: source.y + nodeH/2 };
    const t = { x: target.x, y: target.y - nodeH/2 };
    return `M ${s.x},${s.y} C ${s.x},${(s.y + t.y)/2} ${t.x},${(s.y + t.y)/2} ${t.x},${t.y}`;
  }
</script>
</body>
</html>
