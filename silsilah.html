<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silsilah Keluarga - Eyang Kromoredjo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ct:#3B1F0E;--cs:#6B3A1F;--cm:#A0622A;--cb:#C8894E;--kr:#F5ECD7;--km:#FDF6E9;--em:#C9A84C;--el:#E8C97A}
    body{font-family:'Lora',serif;background:var(--ct);color:var(--kr);min-height:100vh;overflow:hidden}
    
    /* Sidebar & Layout Styles (Seragam dengan Dashboard) */
    .sidebar{width:240px;min-height:100vh;background:var(--cs);border-right:1px solid rgba(201,168,76,.15);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
    .sidebar-header{padding:1.8rem 1.5rem 1.2rem;border-bottom:1px solid rgba(201,168,76,.12)}
    .sidebar-logo-img{width:45px;height:45px;border-radius:50%;object-fit:cover;margin-bottom:1rem;display:block;filter:drop-shadow(0 0 8px rgba(201,168,76,0.2))}
    .sidebar-logo{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;color:var(--em);text-transform:uppercase;margin-bottom:.3rem;font-weight:700}
    .sidebar-nama{font-family:'Playfair Display',serif;font-size:1rem;color:var(--kr);line-height:1.3}
    .sidebar-nav{flex:1;padding:1rem 0}
    .nav-label{font-family:'Cinzel',serif;font-size:0.85rem;font-weight:800;letter-spacing:0.2em;color:var(--em);text-transform:uppercase;padding:1.5rem 1.5rem 0.5rem;border-bottom:2px solid rgba(201,168,76,0.3);margin-bottom:0.8rem;display:block;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
    .nav-item{display:flex;align-items:center;gap:.8rem;padding:.75rem 1.5rem;cursor:pointer;color:rgba(245,236,215,.6);font-size:.85rem;transition:all .25s;border-left:2px solid transparent}
    .nav-item:hover{color:var(--kr);background:rgba(201,168,76,.06)}
    .nav-item.aktif{color:var(--em);border-left-color:var(--em);background:rgba(201,168,76,.08)}
    .nav-item .ni{font-size:1rem;width:1.2rem;text-align:center}
    .konten-utama{margin-left:240px;flex:1;min-height:100vh;padding:2rem}
    .topbar{padding:1.2rem 2.5rem;border-bottom:1px solid rgba(201,168,76,.1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(59,31,14,.95);backdrop-filter:blur(10px);z-index:50;margin:-2rem -2rem 2rem -2rem; gap: 1rem;}
    .topbar-judul{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:.15em;color:var(--em);text-transform:uppercase;font-weight:600}
    .topbar-user{font-size:.9rem;color:var(--cb);font-style:italic;text-align:right;line-height:1.2; margin-right: 0.5rem;}

    .sidebar-footer{padding:1.2rem 1.5rem;border-top:1px solid rgba(201,168,76,.12);margin-top:auto}
    .sidebar-level{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;color:var(--em);text-align:center;margin-bottom:.8rem;font-weight:700}
    .tombol-keluar{width:100%;padding:.6rem;background:transparent;border:1px solid rgba(201,168,76,.5);color:var(--cb);font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .3s;font-weight:700}
    .tombol-keluar:hover{border-color:var(--em);color:var(--em)}

    /* SILSILAH INTERAKTIF STYLES */
    .silsilah-container {
      width: 100%;
      height: calc(100vh - 120px);
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle at center, rgba(107,58,31,0.3) 0%, transparent 85%);
    }
    #tree-svg { width: 100%; height: 100%; cursor: grab; transition: transform 0.4s ease, width 0.4s ease, height 0.4s ease; transform-origin: center; }
    #tree-svg:active { cursor: grabbing; }

    .link { fill: none; stroke: var(--em); stroke-width: 1.5px; opacity: 0.3; transition: all 0.3s; }
    .node { cursor: pointer; }
    .node rect { 
      fill: var(--cs); 
      stroke: var(--em); 
      stroke-width: 1px; 
      rx: 4px; ry: 4px; 
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
      transition: all 0.3s;
    }
    .node:hover rect { stroke: var(--el); stroke-width: 2px; }
    .node text { pointer-events: none; user-select: none; }
    .node .nama { font-family: 'Playfair Display', serif; font-size: 13px; fill: var(--kr); font-weight: bold; }
    .node .panggilan { font-family: 'Cinzel', serif; font-size: 9px; fill: var(--em); }
    .node .pasangan { font-size: 10px; fill: var(--cb); font-style: italic; }
    .node .arisan-icon { font-size: 14px; }
    
    .collapse-btn { fill: var(--ct); stroke: var(--em); stroke-width: 1px; }
    .collapse-text { font-size: 10px; fill: var(--em); font-weight: bold; }

    .zoom-controls {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 60;
    }
    .zoom-btn {
      width: 40px; height: 40px;
      background: var(--cs);
      border: 1px solid var(--em);
      color: var(--em);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      border-radius: 4px;
    }
    .zoom-btn:hover { background: var(--cm); color: var(--el); }

    .btn-back {
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      padding: .4rem .65rem;
      border-radius: 9px;
      transition: background .2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      margin-right: 0.5rem;
    }
    .btn-back:hover { background: rgba(255,255,255,0.22); }

    /* Responsive Sidebar */
    .hamburger{display:none;background:none;border:none;color:var(--em);font-size:1.3rem;cursor:pointer}
    .overlay-sidebar{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
    .overlay-sidebar.aktif{display:block}

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform .3s ease; }
      .sidebar.buka { transform: translateX(0); }
      .konten-utama { margin-left: 0; padding: 1.2rem; }
      .hamburger { display: block; }
      .topbar { padding: 1.2rem 1.5rem; }
      .topbar-judul { margin-left: 1rem; flex: 1; }
    }

    /* STYLE KHUSUS SUBMENU */
    #arisan-submenu, #laporan-submenu { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; overflow: hidden; }
    #arisan-submenu .nav-item, #laporan-submenu .nav-item { border-left: none; opacity: 0.7; padding: 0.6rem 1.5rem 0.6rem 3.2rem; font-size: 0.78rem; min-height: auto; border-bottom: 1px solid rgba(201,168,76,0.05); }
    #arisan-submenu .nav-item:hover, #laporan-submenu .nav-item:hover { opacity: 1; background: rgba(255,255,255,0.03); }
    #arisan-submenu .nav-item.aktif, #laporan-submenu .nav-item.aktif { opacity: 1; color: var(--em); font-weight: 600; background: rgba(201,168,76,0.05); }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <!-- Overlay mobile -->
  <div class="overlay-sidebar" id="overlay-sidebar" onclick="tutupSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="logo PKEK.jpg" alt="Logo" class="sidebar-logo-img">
      <p class="sidebar-logo">Paguyuban Keluarga</p>
      <p class="sidebar-nama">Eyang<br>Kromoredjo</p>
    </div>
    <div class="sidebar-nav">
      <p class="nav-label">Menu Utama</p>
      <div class="nav-item" onclick="location.href='dashboard.html'"><span class="ni">🏠</span> Beranda</div>
      <div id="nav-pengurus" style="display:none">
        <div class="nav-item" onclick="location.href='dashboard.html#anggota'"><span class="ni">👥</span> Anggota</div>
        
        <!-- TOMBOL INDUK MANAJEMEN ARISAN -->
        <div class="nav-item" id="nav-induk-arisan" onclick="window.toggleArisanSubmenu()" style="justify-content: space-between;">
          <div style="display:flex; align-items:center; gap:.8rem;">
            <span class="ni">💰</span> Manajemen Arisan
          </div>
          <span id="arisan-chevron" style="font-size: 0.6rem; transition: 0.3s; transform: rotate(-90deg);">▼</span>
        </div>

        <!-- KONTAINER SUB-MENU -->
        <div id="arisan-submenu" style="max-height: 0px; opacity: 0; background: rgba(0,0,0,0.2); margin-bottom: 0; border-left: 2px solid var(--em); margin-left: 1.2rem;">
          <div class="nav-item" onclick="location.href='modules/arisan.html#aturan'"><span class="ni">📜</span> Aturan</div>
          <div class="nav-item" onclick="location.href='modules/arisan.html#peserta'"><span class="ni">👥</span> Peserta</div>
          <div class="nav-item" id="sub-nav-iuran-arisan" onclick="location.href='modules/arisan.html#iuran'"><span class="ni">💳</span> Iuran</div>
          <div class="nav-item" id="sub-nav-pengeluaran-arisan" onclick="location.href='modules/arisan.html#pengeluaran'"><span class="ni">📉</span> Pengeluaran</div>
          <div class="nav-item" id="sub-nav-tipe-arisan" onclick="location.href='modules/arisan.html#tipe'"><span class="ni">⚙️</span> Tipe</div>
          <div class="nav-item" id="sub-nav-penerima-arisan" onclick="location.href='modules/arisan.html#penerima'"><span class="ni">📅</span> Penerima</div>
        </div>

        <div class="nav-item" id="nav-bukubesar" onclick="location.href='bukubesar.html'"><span class="ni">📖</span> Buku Besar</div>
        <div class="nav-item aktif" onclick="tutupSidebar()"><span class="ni">🌳</span> Silsilah</div>

        <div class="nav-item" id="nav-induk-laporan" onclick="location.href='modules/laporan.html'"><span class="ni">📊</span> Laporan Keuangan</div>
        <div class="nav-item" id="nav-logs" style="display:none" onclick="location.href='dashboard.html#logs'"><span class="ni">📋</span> Log Aktivitas</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <p class="sidebar-level" id="sidebar-level"></p>
      <button id="btn-keluar-sidebar" class="tombol-keluar" onclick="window.keluar()" style="display:none">✦ Keluar</button>
      <p style="font-size: 0.5rem; color: var(--cb); text-align: center; margin-top: 1rem; opacity: 0.6; font-family: 'Cinzel'; letter-spacing: 1px;">Sistem oleh Budi Purwanto bin Tukimin · 2025</p>
    </div>
  </nav>

  <main class="konten-utama">
    <div class="topbar">
      <div style="display:flex; align-items:center;">
        <button class="btn-back" onclick="location.href='dashboard.html'">❮</button>
        <button class="hamburger" onclick="bukaSidebar()" style="display: block;">☰</button>
      </div>
      <p class="topbar-judul">Pohon Silsilah <em>Keluarga</em></p>
      <p class="topbar-user" id="topbar-user"></p>
    </div>

    <div class="silsilah-container">
      <svg id="tree-svg"></svg>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="Zoom In">+</button>
        <button class="zoom-btn" id="zoom-out" title="Zoom Out">−</button>
        <button class="zoom-btn" id="zoom-rotate" title="Rotasi 90°">↻</button>
        <button class="zoom-btn" id="zoom-reset" title="Reset Tampilan">⟲</button>
      </div>
    </div>
  </main>

<script type="module">
  import { db } from './js/firebase-config.js';
  import { ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Fungsi Sidebar Mobile
  window.bukaSidebar = () => { document.getElementById('sidebar').classList.add('buka'); document.getElementById('overlay-sidebar').classList.add('aktif'); };
  window.tutupSidebar = () => { document.getElementById('sidebar').classList.remove('buka'); document.getElementById('overlay-sidebar').classList.remove('aktif'); };

  window.toggleArisanSubmenu = function() {
    const submenu = document.getElementById('arisan-submenu');
    const chevron = document.getElementById('arisan-chevron');
    const isClosed = !submenu.style.maxHeight || submenu.style.maxHeight === '0px';
    if (isClosed) {
      submenu.style.maxHeight = '500px';
      submenu.style.opacity = '1';
      submenu.style.marginBottom = '0.5rem';
      chevron.style.transform = 'rotate(0deg)';
    } else {
      submenu.style.maxHeight = '0px';
      submenu.style.opacity = '0';
      submenu.style.marginBottom = '0';
      chevron.style.transform = 'rotate(-90deg)';
    }
  };

  window.toggleLaporanSubmenu = function() {
    const submenu = document.getElementById('laporan-submenu');
    const chevron = document.getElementById('laporan-chevron');
    const isClosed = !submenu.style.maxHeight || submenu.style.maxHeight === '0px';
    if (isClosed) {
      submenu.style.maxHeight = '500px';
      submenu.style.opacity = '1';
      submenu.style.marginBottom = '0.5rem';
      chevron.style.transform = 'rotate(0deg)';
    } else {
      submenu.style.maxHeight = '0px';
      submenu.style.opacity = '0';
      submenu.style.marginBottom = '0';
      chevron.style.transform = 'rotate(-90deg)';
    }
  };

  window.keluar = function() {
    sessionStorage.removeItem('kromoredjo_user');
    window.location.href = 'dashboard.html';
  };

  // Proteksi Halaman
  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('kromoredjo_user');
    if (!saved) {
      location.href = 'dashboard.html';
    } else {
      const user = JSON.parse(saved);
      window.penggunaLogin = user;
      
      // Setup UI Silsilah
      const levelMap = { admin: '👑 Admin', pengurus: '🛡️ Pengurus', anggota: '🔑 Anggota' };
      const roleText = levelMap[user.level] || user.level;
      document.getElementById('sidebar-level').textContent = roleText;
      document.getElementById('topbar-user').innerHTML = `${roleText}<br>${user.username}`;
      document.getElementById('btn-keluar-sidebar').style.display = 'block';
      document.getElementById('nav-pengurus').style.display = 'block';
      
      const isAnggota = user.level === 'anggota';
      ['sub-nav-iuran-arisan', 'sub-nav-pengeluaran-arisan', 'sub-nav-tipe-arisan', 'sub-nav-penerima-arisan'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = isAnggota ? 'none' : 'flex';
      });
      ['sub-nav-iuran', 'sub-nav-pengeluaran', 'sub-nav-siklus', 'sub-nav-putaran'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = isAnggota ? 'none' : 'flex';
      });
      const navLogs = document.getElementById('nav-logs');
      if(navLogs) navLogs.style.display = user.level === 'admin' ? 'block' : 'none';

      startRealtimeSilsilah();
    }
  });

  let root, treeLayout, svg, gContainer, zoom, currentRotation = 0;
  const nodeW = 180, nodeH = 70;

  function startRealtimeSilsilah() {
    const now = new Date();
    const currentKey = `${now.getFullYear()}_${now.getMonth() + 1}`;
    onValue(ref(db, "anggota"), (snapAnggota) => {
      onValue(ref(db, "arisan/" + currentKey), (snapArisan) => {
        const anggota = snapAnggota.exists() ? Object.values(snapAnggota.val()) : [];
        const arisan = snapArisan.exists() ? snapArisan.val().pembayaran : [];
        initD3(anggota, arisan);
      });
    });
  }

  function initD3(data, arisanData) {
    const lunasIds = arisanData ? arisanData.filter(p => p.lunas).map(p => p.id) : [];
    const spouseMap = {};
    data.forEach(a => { 
      const sid = a.spouseId || a.idPasangan;
      if(sid) spouseMap[String(sid)] = a; 
    });

    const nest = (pId) => {
      return data.filter(a => String(a.parentId || a.idOrangTua) === String(pId))
                 .sort((a, b) => (parseInt(a.urutan || a.urutan_anak) || 0) - (parseInt(b.urutan || b.urutan_anak) || 0))
                 .map(child => ({
                   ...child,
                   isLunas: lunasIds.includes(child.id),
                   spouse: spouseMap[String(child.id)],
                   children: nest(child.id)
                 }));
    };

    const roots = data.filter(a => {
        const pId = a.parentId || a.idOrangTua;
        const sId = a.spouseId || a.idPasangan;
        return (!pId || pId === "") && !sId;
    });
    if (!roots.length) return;

    const hierarchyData = roots.length > 1 
      ? { name: "Root", dummy: true, children: roots.map(r => ({ ...r, isLunas: lunasIds.includes(r.id), spouse: spouseMap[r.id], children: nest(r.id) })) }
      : { ...roots[0], isLunas: lunasIds.includes(roots[0].id), spouse: spouseMap[roots[0].id], children: nest(roots[0].id) };

    svg = d3.select("#tree-svg");
    svg.selectAll("*").remove();
    gContainer = svg.append("g");

    zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => gContainer.attr("transform", e.transform));
    svg.call(zoom);

    d3.select("#zoom-in").on("click", () => svg.transition().call(zoom.scaleBy, 1.3));
    d3.select("#zoom-out").on("click", () => svg.transition().call(zoom.scaleBy, 0.7));
    d3.select("#zoom-reset").on("click", () => svg.transition().call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 50).scale(0.8)));

    d3.select("#zoom-rotate").on("click", () => {
      currentRotation = (currentRotation === 0) ? 90 : 0;
      const container = document.querySelector('.silsilah-container');
      const kontW = container.clientWidth;
      const kontH = container.clientHeight;

      if (currentRotation === 90) {
        // Tukar dimensi agar lebar SVG menggunakan tinggi layar
        svg.style("width", kontH + "px")
           .style("height", kontW + "px")
           .style("position", "absolute")
           .style("top", "50%")
           .style("left", "50%")
           .style("transform", `translate(-50%, -50%) rotate(${currentRotation}deg)`);
      } else {
        // Kembali ke dimensi normal
        svg.style("width", "100%")
           .style("height", "100%")
           .style("position", "relative")
           .style("top", "0")
           .style("left", "0")
           .style("transform", `rotate(${currentRotation}deg)`);
      }
      
      // Reset tampilan agar bagan berada di tengah ruang yang baru
      setTimeout(() => {
        svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 50).scale(0.8));
      }, 450);
    });

    treeLayout = d3.tree().nodeSize([nodeW + 40, nodeH + 100]);
    root = d3.hierarchy(hierarchyData);
    root.x0 = svg.node().clientWidth / 2;
    root.y0 = 0;

    update(root);
    svg.call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 50).scale(0.8));
  }

  function update(source) {
    const treeData = treeLayout(root);
    const nodes = treeData.descendants().filter(d => !d.data.dummy);
    const links = treeData.links().filter(d => !d.source.data.dummy);

    nodes.forEach(d => { d.y = d.depth * 180; });

    const node = gContainer.selectAll("g.node").data(nodes, d => d.data.id);
    const nodeEnter = node.enter().append("g")
      .attr("class", "node")
      .attr("transform", d => `translate(${source.x0 || source.x},${source.y0 || source.y})`)
      .on("click", (event, d) => {
        if (d.children) { d._children = d.children; d.children = null; }
        else { d.children = d._children; d._children = null; }
        update(d);
      });

    nodeEnter.append("rect").attr("width", nodeW).attr("height", nodeH).attr("x", -nodeW/2).attr("y", -nodeH/2);
    
    nodeEnter.append("text").attr("class", "nama").attr("text-anchor", "middle").attr("y", -10)
      .text(d => (d.data.kehidupan === 'wafat' ? '🪦 ' : '') + d.data.nama);
    
    nodeEnter.append("text").attr("class", "panggilan").attr("text-anchor", "middle").attr("y", 10)
      .text(d => d.data.panggilan ? `"${d.data.panggilan}"` : `Gen ${d.data.generasi}`);

    nodeEnter.each(function(d) {
      if (d.data.spouse) {
        const label = d.data.gender === 'P' ? 'Istri dari' : 'Suami dari';
        d3.select(this).append("text").attr("class", "pasangan").attr("text-anchor", "middle").attr("y", 25)
          .text(`${label} ${d.data.spouse.panggilan || d.data.spouse.nama}`);
      }
      if (d.data.isLunas) {
        d3.select(this).append("text").attr("class", "arisan-icon").attr("x", nodeW/2 - 15).attr("y", -nodeH/2 + 15).text("💰");
      }
      if (d.children || d._children) {
        d3.select(this).append("circle").attr("class", "collapse-btn").attr("r", 7).attr("cy", nodeH/2);
        d3.select(this).append("text").attr("class", "collapse-text").attr("text-anchor", "middle").attr("y", nodeH/2 + 3)
          .text(d => d.children ? "−" : "+");
      }
    });

    const nodeUpdate = nodeEnter.merge(node);
    nodeUpdate.transition().duration(500).attr("transform", d => `translate(${d.x},${d.y})`);
    nodeUpdate.select("text.collapse-text").text(d => d.children ? "−" : "+");

    const nodeExit = node.exit().transition().duration(500)
      .attr("transform", d => `translate(${source.x},${source.y})`).remove();

    const link = gContainer.selectAll("path.link").data(links, d => d.target.id);
    const linkEnter = link.enter().insert("path", "g")
      .attr("class", "link")
      .attr("d", d => {
        const o = { x: source.x0 || source.x, y: source.y0 || source.y };
        return generatorGarisSiku({ source: o, target: o });
      });

    link.merge(linkEnter).transition().duration(500).attr("d", generatorGarisSiku);
    link.exit().transition().duration(500).attr("d", d => {
      const o = { x: source.x, y: source.y };
      return generatorGarisSiku({ source: o, target: o });
    }).remove();

    nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
  }

  function generatorGarisSiku({ source, target }) {
    const s = { x: source.x, y: source.y + nodeH/2 };
    const t = { x: target.x, y: target.y - nodeH/2 };
    return `M ${s.x},${s.y} C ${s.x},${(s.y + t.y)/2} ${t.x},${(s.y + t.y)/2} ${t.x},${t.y}`;
  }
</script>
