<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Silsilah Interaktif - PKEK</title>
    
    <!-- Google Fonts: Inter & Lora agar senada dengan modul anggota -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="../css/style.css">

    <!-- Memanggil Library D3.js via CDN -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../js/database.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--ct);
            color: var(--kr);
            margin: 0;
            overflow: hidden; /* Supaya geser pohon tidak merusak scrollbar utama */
        }

        .pohon-header {
            background-color: rgba(29, 19, 10, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }

        .pohon-title h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: var(--em);
            margin: 0;
            font-size: 1.4rem;
        }

        .pohon-title p {
            font-size: 0.85rem;
            color: var(--cb);
            margin: 4px 0 0 0;
            font-weight: 500;
        }

        .pohon-instructions {
            position: absolute;
            bottom: 25px;
            left: 25px;
            background: rgba(29, 19, 10, 0.8);
            backdrop-filter: blur(8px);
            padding: 14px 18px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            font-size: 0.8rem;
            line-height: 1.7;
            pointer-events: none; /* Supaya tidak mengganggu klik canvas */
            border: 1px solid rgba(201, 168, 76, 0.2);
            z-index: 5;
            max-width: 280px;
            color: var(--cb);
        }

        .pohon-legend {
            position: absolute;
            top: 105px;
            left: 25px;
            background: rgba(29, 19, 10, 0.8);
            backdrop-filter: blur(8px);
            padding: 14px 16px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            font-size: 0.8rem;
            line-height: 1.8;
            border: 1px solid rgba(201, 168, 76, 0.2);
            z-index: 5;
            max-width: 280px;
            color: var(--cb);
        }

        .pohon-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .pohon-legend .legend-chip {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        .pohon-legend .legend-chip.trah { background: none; border: 2px solid var(--em); }
        .pohon-legend .legend-chip.spouse { background: none; border: 2px solid rgba(201, 168, 76, 0.4); }
        .pohon-legend .legend-chip.wafat { background: rgba(100,100,100,0.5); border: 2px solid #666; }

        /* Area Canvas Tempat Pohon Digambar */
        #canvas-pohon {
            width: 100vw;
            height: calc(100vh - 80px);
            cursor: grab;
            background: radial-gradient(ellipse at 50% 50%, rgba(107, 58, 31, 0.15) 0%, transparent 70%), var(--ct);
        }

        #canvas-pohon:active {
            cursor: grabbing;
        }

        /* Gaya Garis Penghubung (Links) - FUTURISTIK */
        .link {
            fill: none;
            stroke: rgba(201, 168, 76, 0.4);
            stroke-width: 1.5px;
            transition: stroke 0.2s ease;
        }

        /* Gaya Kotak Anggota Keluarga (Nodes) - FUTURISTIK GLASSMORPHISM */
        .node {
            cursor: pointer;
        }

        .node-card {
            fill: rgba(201, 168, 76, 0.05);
            stroke-width: 1.5px;
            rx: 16px;
            ry: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .node-card.trah {
            stroke: var(--em);
            filter: drop-shadow(0px 0px 8px rgba(201, 168, 76, 0.3));
        }

        .node-card.spouse {
            stroke: rgba(201, 168, 76, 0.4);
        }

        .node-card.wafat {
            fill: rgba(80, 80, 80, 0.2);
            stroke: #666;
        }

        .node:hover .node-card {
            stroke-width: 2px;
            filter: drop-shadow(0px 0px 15px rgba(201, 168, 76, 0.5));
        }

        .node text {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            fill: var(--cb);
            pointer-events: none;
        }

        .node .nama-utama {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            fill: var(--kr);
            font-size: 17px;
        }

        .node .nama-utama.wafat-text, .node .nama-pasangan.wafat-text {
            fill: #999;
            font-style: italic;
        }

        .node .hati {
            font-size: 16px;
            fill: var(--em);
            opacity: 0.6;
        }

        .node .nama-pasangan {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            font-size: 17px;
        }

        .node .label-gen {
            font-size: 11px;
            fill: var(--em);
            font-weight: 600;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .node .collapse-indicator {
            fill: rgba(201, 168, 76, 0.2);
            stroke: var(--em);
            stroke-width: 1.5px;
        }

        .node .collapse-indicator.collapsed {
            fill: var(--em);
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title-container">
            <img src="../logo PKEK.jpg" alt="Logo PKEK" class="logo-mini" style="filter: invert(90%) sepia(21%) saturate(575%) hue-rotate(325deg) brightness(95%) contrast(86%);">
            <h2 style="font-family: 'Playfair Display', serif; font-weight: 700; color: var(--em);">Bagan Pohon Silsilah Keluarga Besar</h2>
        </div>
       <div class="header-right">
    <span id="user-role-badge" class="badge-user-role">Role</span>
    <button class="btn-kembali-mini" style="background-color: var(--em); color: var(--ct); margin-right: 10px; border: none;" onclick="window.location.href='../dashboard.html#anggota-daftar'">← Kembali ke Daftar</button>
    <button class="btn-kembali-mini" style="color: var(--krem-hangat); border-color: var(--emas-redup); font-weight: 700;" onclick="window.location.href='../dashboard.html'">← Menu Utama</button>
</div>
    </header>

    <!-- Instruksi Melayang Ringan -->
    <div class="pohon-instructions">
        💡 <strong>Panduan Navigasi:</strong><br>
        • <strong>Geser:</strong> Klik & seret untuk bergerak<br>
        • <strong>Zoom:</strong> Scroll mouse untuk zoom in/out<br>
        • <strong>Collapse:</strong> Klik kartu untuk sembunyikan/tampilkan keturunan
    </div>

    <div class="pohon-legend">
        <div style="font-weight:600; margin-bottom:8px;">Keterangan Bagan</div>
        <div class="legend-item"><span class="legend-chip trah"></span> Garis Keturunan</div>
        <div class="legend-item"><span class="legend-chip spouse"></span> Anggota Masuk</div>
        <div class="legend-item"><span class="legend-chip wafat"></span> Telah Wafat</div>
    </div>

    <!-- Wadah SVG D3.js -->
    <svg id="canvas-pohon"></svg>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            muatDanBangunPohon();
        });

        function splitTextLines(text, maxChars) {
            const words = text.split(' ');
            const lines = [];
            let current = '';
            words.forEach(word => {
                const test = current ? `${current} ${word}` : word;
                if (test.length > maxChars) {
                    if (current) lines.push(current);
                    current = word;
                } else {
                    current = test;
                }
            });
            if (current) lines.push(current);
            return lines;
        }

        function muatDanBangunPohon() {
            // 1. Ambil data mentah dari LocalStorage
            let listAnggota = [];
            try {
                listAnggota = JSON.parse(localStorage.getItem("kromoredjo_keluarga")) || [];
            } catch (e) {
                listAnggota = [];
            }

            if (listAnggota.length === 0) {
                // Tampilkan contoh preview pasangan Kromoredjo dan Juwer jika belum ada data
                listAnggota = [
                    { id: 1, nama: "Kromoredjo", generasi: 0, wafat: false, jenisKelamin: "Laki-Laki", parentId: null, spouseId: 2 },
                    { id: 2, nama: "Juwer", generasi: 0, wafat: false, jenisKelamin: "Perempuan", parentId: null, spouseId: 1 }
                ];
            }

            // 2. Transformasi relasi tabel flat menjadi Relasi Struktur Hierarki (Tree JSON)
            // Kita cari dulu Eyang / Gen 0 sebagai akar teratas
            let dataEyang = listAnggota.find(m => m.generasi === 0 && !m.spouseId);
            
            if (!dataEyang) {
                // Jika eyang belum diinput, pakai dummy root atau item pertama agar tidak crash
                dataEyang = listAnggota[0];
            }

            function bangunHierarkiKeluarga(nodeSekarang) {
                let nodeD3 = {
                    id: nodeSekarang.id,
                    nama: nodeSekarang.nama,
                    generasi: nodeSekarang.generasi,
                    wafat: nodeSekarang.wafat,
                    isTrah: !!(nodeSekarang.parentId || String(nodeSekarang.generasi) === '0'),
                    spouseId: nodeSekarang.spouseId,
                    pasangan: null,
                    children: []
                };

                // Cari apakah orang ini punya pasangan (menantu) di generasi yang sama.
                // Periksa kedua arah: partner bisa menyimpan spouseId ke orang ini, atau orang ini menyimpan spouseId ke partner.
                let jodoh = listAnggota.find(m => parseInt(m.spouseId) === nodeSekarang.id);
                if (!jodoh && nodeSekarang.spouseId) {
                    jodoh = listAnggota.find(m => m.id === parseInt(nodeSekarang.spouseId));
                }
                if (jodoh) {
                    nodeD3.pasangan = {
                        nama: jodoh.nama, 
                        wafat: jodoh.wafat
                    };
                }

                // Cari semua anak kandung yang memiliki parentId merujuk ke id orang ini
                let daftarAnak = listAnggota.filter(m => parseInt(m.parentId) === nodeSekarang.id && !m.spouseId);
                daftarAnak.forEach(anak => {
                    nodeD3.children.push(bangunHierarkiKeluarga(anak));
                });

                if (nodeD3.children.length === 0) {
                    delete nodeD3.children; // D3 butuh undefined/null jika tidak ada child
                }

                return nodeD3;
            }

            const dataPohonStruktur = bangunHierarkiKeluarga(dataEyang);

            // 3. Setup Canvas SVG dan Fitur Zoom/Pan Dragging
            const svg = d3.select("#canvas-pohon");
            const width = window.innerWidth;
            const height = window.innerHeight - 80;
            
            svg.attr("width", width).attr("height", height);
            
            // Bersihkan SVG jika ada rendering sisa sebelumnya
            svg.selectAll("*").remove();

            const containerG = svg.append("g").attr("class", "pohon-container-group");

            // Mekanisme Zooming & Panning cerdas
            const fungsiZoom = d3.zoom()
                .scaleExtent([0.3, 3])
                .on("zoom", (event) => {
                    containerG.attr("transform", event.transform);
                });

            svg.call(fungsiZoom);

            // 4. Inisialisasi Layout Pohon D3
            // Jarak kotak ke samping (lebar) dan jarak ke bawah (tinggi antar generasi)
            const nodeWidth = 280;
            const nodeHeight = 160;
            const treeLayout = d3.tree().nodeSize([nodeWidth + 80, nodeHeight + 160]);
            
            // Bangun root D3 dari struktur data pohon yang sudah disusun
            const rootNode = d3.hierarchy(dataPohonStruktur);
            // Simpan kondisi awal collapse (semua anak default terbuka di memori internal d3, nanti bisa diklik sembunyi)
            rootNode.x0 = width / 2;
            rootNode.y0 = 50;

            // Jalankan fungsi update pertama kali
            jalankanRenderPohon(rootNode);

            function jalankanRenderPohon(source) {
                const dataPohonTerhitung = treeLayout(rootNode);
                const nodes = dataPohonTerhitung.descendants();
                const links = dataPohonTerhitung.links();

                // Atur kedalaman vertikal tiap generasi secara soft dan proposional
                nodes.forEach(d => { d.y = d.depth * 240 + 100; });

                // ---- BAGIAN A: PENGGAMBARAN GARIS RELASI (LINKS) ----
                const linkIdFunct = d => d.target.id;
                const linkCont = containerG.selectAll("path.link").data(links, linkIdFunct);

                // Garis Baru Datang (Enter)
                const linkEnter = linkCont.enter().append("path")
                    .attr("class", "link")
                    .attr("d", d => {
                        const o = { x: source.x0, y: source.y0 };
                        return generatorGarisSiku({ source: o, target: o });
                    });

                // Transisi Update Posisi Garis
                linkCont.merge(linkEnter).transition().duration(400)
                    .attr("d", generatorGarisSiku);

                // Garis Dihapus (Exit)
                linkCont.exit().transition().duration(400)
                    .attr("d", d => {
                        const o = { x: source.x, y: source.y };
                        return generatorGarisSiku({ source: o, target: o });
                    })
                    .remove();

                // ---- BAGIAN B: PENGGAMBARAN KOTAK ANGGOTA (NODES) ----
                const nodeCont = containerG.selectAll("g.node").data(nodes, d => d.data.id);

                // Node Baru Datang
                const nodeEnter = nodeCont.enter().append("g")
                    .attr("class", "node")
                    .attr("transform", d => `translate(${source.x0},${source.y0})`)
                    .on("click", (event, d) => {
                        // Logika Toggle Collapse Cabang Keturunan
                        if (d.children) {
                            d._children = d.children;
                            d.children = null;
                        } else if (d._children) {
                            d.children = d._children;
                            d._children = null;
                        }
                        jalankanRenderPohon(d);
                    });

                // Gambar Kotak (Background Box) - Modern Design
                nodeEnter.append("rect")
                    .attr("class", d => {
                        if (d.data.wafat) return "node-card wafat";
                        if (d.data.isTrah) return "node-card trah";
                        return "node-card spouse";
                    })
                    .attr("width", nodeWidth)
                    .attr("height", nodeHeight)
                    .attr("x", -nodeWidth / 2)
                    .attr("y", -nodeHeight / 2);

                // Konsistenkan padding dan posisi teks
                const innerPad = 14;
                const namaUtamaY = -nodeHeight / 2 + 35;
                const hatiY = 0;
                const pasanganTextY = nodeHeight / 2 - 25;

                // Nama Utama (Atas)
                nodeEnter.append("text")
                    .attr("class", d => {
                        return d.data.wafat ? "nama-utama wafat-text" : "nama-utama";
                    })
                    .attr("text-anchor", "middle")
                    .attr("y", namaUtamaY)
                    .text(d => d.data.nama);

                // Label Generasi (kecil di pojok kanan atas)
                nodeEnter.append("text")
                    .attr("class", "label-gen")
                    .attr("x", nodeWidth / 2 - 12)
                    .attr("y", -nodeHeight / 2 + 18)
                    .attr("text-anchor", "end")
                    .text(d => `Gen ${d.data.generasi}`);

                // Hati + Nama Pasangan (jika ada)
                nodeEnter.each(function(d) {
                    const groupKlmpk = d3.select(this);
                    if (d.data.pasangan) {
                        // Hati di tengah
                        groupKlmpk.append("text")
                            .attr("class", "hati")
                            .attr("text-anchor", "middle")
                            .attr("y", hatiY + 5)
                            .text("❤️");

                        // Nama Pasangan (Bawah)
                        groupKlmpk.append("text")
                            .attr("class", d => {
                                return d.data.pasangan.wafat ? "nama-pasangan wafat-text" : "nama-pasangan";
                            })
                            .attr("text-anchor", "middle")
                            .attr("y", pasanganTextY)
                            .text(d.data.pasangan.nama);
                    }

                    // Indikator collapse (lingkaran di bawah kotak)
                    if (d.children || d._children) {
                        groupKlmpk.append("circle")
                            .attr("class", d => "collapse-indicator" + (d._children ? " collapsed" : ""))
                            .attr("r", 6)
                            .attr("cy", nodeHeight / 2 + 12);
                    }
                });

                // Transisi Update Posisi perpindahan Kotak lama & baru
                const nodeUpdate = nodeCont.merge(nodeEnter);
                
                nodeUpdate.transition().duration(400)
                    .attr("transform", d => `translate(${d.x},${d.y})`);

                // Mengubah warna tombol indikator saat status collapse berubah
                nodeUpdate.select(".collapse-indicator")
                    .attr("class", d => "collapse-indicator" + (d._children ? " collapsed" : ""));

                // Node Dihapus (Sembunyikan/Exit)
                const nodeExit = nodeCont.exit().transition().duration(400)
                    .attr("transform", d => `translate(${source.x},${source.y})`)
                    .remove();

                // Simpan posisi saat ini untuk referensi animasi berikutnya
                nodes.forEach(d => {
                    d.x0 = d.x;
                    d.y0 = d.y;
                });
            }

            // Fungsi pembentuk jalur siku-siku rapi dari kotak orang tua ke anak-anaknya
            function generatorGarisSiku({ source, target }) {
                return `M ${source.x},${source.y + nodeHeight/2}
                        C ${source.x},${(source.y + target.y) / 2}
                          ${target.x},${(source.y + target.y) / 2}
                          ${target.x},${target.y - nodeHeight/2}`;
            }

            // Fokuskan kamera otomatis tepat di tengah atas pada nama Eyang mula-mula
            svg.call(fungsiZoom.transform, d3.zoomIdentity.translate(width / 2, 80).scale(0.8));
        }
    </script>
</body>
</html>
